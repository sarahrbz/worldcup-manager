<div class="container mt-5 d-flex justify-content-center">
    <div class="card p-4 shadow-sm rounded-4 mb-4" style="width: 700px;">
    <h2 class="mb-4 text-center fw-bold"> <i class="bi bi-flag-fill"></i> Seleções</h2>

    <table class="table table-striped table-hover">
      <thead class="table-success">
        <tr>
          <th scope="col"> ID </th>
          <th scope="col">Nome</th>
          <th scope="col">Técnico</th>
          <th scope="col">Grupo</th>
          <th scope="col">Ranking FIFA</th>
          <th scope="col">Número de Títulos</th>
          <th scope="col">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of selecoes()">
          <th scope="row">{{s.id}}</th>
          <td>{{s.name}}</td>
          <td>{{s.coach}}</td>
          <td>{{s.group}}</td>
          <td>{{s.fifaRanking}}</td>
          <td>{{s.numberOfTitles}}</td>
          <td>
            <button class="btn btn-sm btn-primary me-2" (click)="update(s)"><i class="bi bi-pencil-fill"></i> Editar</button>
            <button class="btn btn-sm btn-danger" (click)="delete(s)"><i class="bi bi-trash-fill"></i> Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
