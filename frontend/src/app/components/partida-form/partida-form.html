<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 shadow-lg rounded-4 mb-4" style="width: 600px;">
    <h2 class="mb-4 text-center fw-bold"><i class="bi bi-trophy-fill"></i> Cadastro de partidas </h2>
    @if (mensagemSucesso()) {
      <div class="alert alert-success">
        <i class="bi bi-check-circle-fill"></i>
          {{ mensagemSucesso() }}
      </div>
}

    @if (mensagemErro()) {
      <div class="alert alert-danger">
        <i class="bi bi-exclamation-triangle-fill"></i>
          {{ mensagemErro() }}
      </div>
    }
    <form [formGroup]="formGroupPartida">

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">
            <i class="bi bi-calendar-event-fill"></i> Data
          </label>
          <input type="date" class="form-control" formControlName="data">
        </div>

        <div class="col-md-8 mb-3">
          <label class="form-label">
            <i class="bi bi-building"></i> Estádio
          </label>
          <input type="text" class="form-control" formControlName="estadio" placeholder="Digite o estádio">
        </div>
      </div>


      <div class="row">
          <div class="col-md-6 mb-3">
            <label for="mandandeId" class="form-label">
              <i class="bi bi-flag-fill"></i> Seleção Mandante
            </label>

            <select class="form-select" formControlName="mandanteId">
              <option value="">Selecione</option>
              @for (selecao of selecoes(); track selecao.id){
                <option [value]="selecao.id">{{ selecao.name }}</option>
              }
            </select>
      </div>

          <div class="col-md-6 mb-3">
            <label for="visitanteId" class="form-label">
              <i class="bi bi-flag-fill"></i> Seleção Visitante
            </label>

            <select class="form-select" formControlName="visitanteId">
              <option value="">Selecione</option>
              @for (selecao of selecoes(); track selecao.id){
                <option [value]="selecao.id">{{ selecao.name }}</option>
              }
            </select>
          </div>
      </div>
      <hr class="my-3">
      <div class="text-center mb-3">
        <h4 class=" fw-bold">
          <i class="bi bi-dribbble"></i> Placar
        </h4>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-6 mb-3">
          <label class="form-label">
             Gols Mandante
          </label>
          <input type="number" class="form-control text-center" formControlName="golsMandante" min="0" placeholder="Ex: 2">
        </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">
            Gols Visitante
        </label>

        <input type="number" class="form-control text-center" formControlName="golsVisitante" min="0" placeholder="Ex: 1">
      </div>
      </div>

      <button *ngIf="!isEditing" type="button" class="btn custom-btn w-100 py-2 text-white" (click)="save()">
        <i class="bi bi-save-fill"></i> Salvar
      </button>

      <button *ngIf="isEditing" type="button" class="btn btn-warning w-100" (click)="update()">
        <i class="bi bi-pencil-fill"></i> Atualizar
      </button>
    </form>
  </div>
</div>
