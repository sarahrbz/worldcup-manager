<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 shadow-lg rounded mb-4" style="width: 600px;">
    <h2 class="mb-4 text-center fw-bold"><i class="bi bi-trophy-fill"></i> Cadastro de partidas </h2>

    <form>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">
            <i class="bi bi-calendar-event-fill"></i> Data
          </label>
          <input type="date" class="form-control" formControlName="data">
        </div>

        <div class="col-md-8 mb-3">
          <label class="form-label">
            <i class="bi bi-building"></i> Estádio
          </label>
          <input type="text" class="form-control" formControlName="estadio" placeholder="Digite o estádio">
        </div>
      </div>


      <div class="row">
          <div class="col-md-6 mb-3">
            <label for="mandandeId" class="form-label">
              <i class="bi bi-flag-fill"></i> Seleção Mandante
            </label>

            <select class="form-select" formControlName="mandanteId">
              <option value="">Selecione</option>
              @for (selecao of selecoes(); track selecao.id){
                <option [value]="selecao.id">{{ selecao.name }}</option>
              }
            </select>
      </div>

          <div class="col-md-6 mb-3">
            <label for="mandandeId" class="form-label">
              <i class="bi bi-flag-fill"></i> Seleção Visitante
            </label>

            <select class="form-select" formControlName="mandanteId">
              <option value="">Selecione</option>
              @for (selecao of selecoes(); track selecao.id){
                <option [value]="selecao.id">{{ selecao.name }}</option>
              }
            </select>
          </div>
      </div>

      <div class="mb-2">
        <label class="form-label fw-bold">
          <i class="bi bi-bullseye"></i> Placar
        </label>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">
            <i class="bi bi-bullseye"></i> Gols Mandante
          </label>
          <input type="number" class="form-control" formControlName="golsMandante" min="0" placeholder="Ex: 2">
        </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">
          <i class="bi bi-bullseye"></i> Gols Visitante
        </label>

        <input type="number" class="form-control" formControlName="golsVisitante" min="0" placeholder="Ex: 1">
      </div>
      </div>

      <button *ngIf="!isEditing" type="button" class="btn custom-btn-player w-100 py-2 text-white" (click)="save()">
        <i class="bi bi-save-fill"></i> Salvar
      </button>

      <button *ngIf="isEditing" type="button" class="btn btn-warning w-100" (click)="update()">
        <i class="bi bi-pencil-fill"></i> Atualizar
      </button>
    </form>
  </div>
</div>
